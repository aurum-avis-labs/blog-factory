# Copy this file to .github/workflows/deploy-blog-update.yml in each landing page repo.
# Brand ID is auto-derived from the repo name (strips "-landing*" suffix).
# blog-factory is a public repo — no token needed for fetching content.
# Requires AZURE_STATIC_WEB_APPS_API_TOKEN secret for deployment.

name: Deploy Blog Update

on:
  repository_dispatch:
    types: [blog-update]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch blog content and build
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./dist
          skip_app_build: true
